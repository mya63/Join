<div class="join-app">
  <figma-header [class.showme]="goOn()"></figma-header>
  <figma-sidenav [class.showme]="goOn()"></figma-sidenav>
  <main id="main-content" [class.public-route]="goOn()">
    <router-outlet></router-outlet>
    <figma-bottom-nav [class.showme]="goOn()"></figma-bottom-nav>
  </main>

  @if (introVisible()) {
  <app-intro [animationConfig]="introConfig()"></app-intro>
  }
</div>
