<main class="login-page">
  <div class="login-frame">
    <header class="login-header">
      <div class="logo-container">

        <img src="assets/img/login/signup/joindark.png" alt="Join Logo" class="logo-img">
      </div>

      <div class="login-signup-hint">
        <span>Not a Join user?</span>
        <button type="button" class="login-signup-btn" (click)="goToSignUp()">Sign up</button>
      </div>
    </header>

    <div class="content-wrapper">
      <section class="login-card">
        <h1 class="login-title">Log in</h1>
        <div class="login-title-underline"></div>

        <form (ngSubmit)="onSubmit()" class="login-form">
          <div class="input-group mya-input-group">
            <input type="text" name="email" [(ngModel)]="email" (ngModelChange)="onEmailInput()" placeholder="Email" required
              class="login-input mya-input-with-icon" [class.input-error]="!!loginErrors.email" />
            <img src="assets/img/login/mail.svg" alt="" class="login-input-icon" />
            @if (loginErrors.email) {
              <p class="error-text">{{ loginErrors.email }}</p>
            }
          </div>

          <div class="input-group mya-input-group">
            <input type="password" name="password" [(ngModel)]="password" (ngModelChange)="onPasswordInput()" placeholder="Password" required
              class="login-input mya-input-with-icon" [class.input-error]="!!loginErrors.password || !!loginErrors.firebase" />
            <img src="assets/img/login/lock.svg" alt="" class="login-input-icon" />
            @if (loginErrors.firebase) {
              <p class="error-text">{{ loginErrors.firebase }}</p>
            } @else if (loginErrors.password) {
              <p class="error-text">{{ loginErrors.password }}</p>
            }
          </div>

          <div class="login-actions">
            <button type="submit" class="login-btn login-btn-primary">Log In</button>
            <button type="button" class="login-btn login-btn-secondary" (click)="onGuestLogin()">
              Guest Log In
            </button>
          </div>
        </form>
      </section>
    </div>
  </div>
  <div class="login-signup-hint-mobile">
    <span>Not a Join user?</span>
    <button type="button" class="login-signup-btn" (click)="goToSignUp()">Sign up</button>
  </div>

  <footer class="login-footer">
    <button type="button" class="login-footer-link" routerLink="/privacy-policy">
      Privacy Policy
    </button>
    <button type="button" class="login-footer-link" routerLink="/legal-notice">
      Legal Notice
    </button>
  </footer>

  @if (showSignUpSuccess()) {
    <div class="login-success-wrap">
      <div class="login-success-backdrop"></div>
      <div class="login-success-toast">
        <span>You successfully signed up. Please log in.</span>
      </div>
    </div>
  }

</main>
