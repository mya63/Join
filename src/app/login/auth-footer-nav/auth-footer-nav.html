<footer class="auth-footer-nav">
  <nav class="auth-footer-menu">
    <button type="button" class="auth-footer-item is-login" [class.is-active]="isRoute('/login')" (click)="goLogin()">
      <span class="auth-footer-icon">
        <img src="assets/img/login/Icons.png" alt="Log In" />
      </span>
      <span class="auth-footer-label">Log In</span>
    </button>

    <div class="auth-footer-right">
      <button type="button" class="auth-footer-item" [class.is-active]="isRoute('/privacy-policy')"
        (click)="goPrivacy()">
        <span class="auth-footer-label">Privacy Policy</span>
      </button>

      <button type="button" class="auth-footer-item" [class.is-active]="isRoute('/legal-notice')" (click)="goLegal()">
        <span class="auth-footer-label">Legal Notice</span>
      </button>
    </div>
  </nav>
</footer>
